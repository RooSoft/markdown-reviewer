<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Markdown Review</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Epunda+Sans:wght@400;500;600&family=Epunda+Slab:wght@400;700&display=swap" />
  <style>
    /* ------------------------------------------------------------------ */
    /* Tokens                                                              */
    /* ------------------------------------------------------------------ */
    :root {
      --violet-twilight: oklch(0.481 0.194 289.55);
      --dark-amethyst: oklch(0.223 0.090 318.94);
      --violet-tint: oklch(0.72 0.14 295);
      --surface: oklch(0.08 0.000 0);
      --surface-raised: oklch(0.14 0.000 0);
      --text-primary: oklch(0.94 0.008 300);
      --text-muted: oklch(0.62 0.01 300);
      --border: oklch(0.20 0.03 310);
      --danger: oklch(0.62 0.18 25);
      --warning: oklch(0.72 0.16 85);
      --success: oklch(0.68 0.15 145);

      --font-mono: "SUSE Mono", ui-monospace, SFMono-Regular, monospace;
      --font-display: "Epunda Slab", serif;
      --font-sans: "Epunda Sans", system-ui, sans-serif;

      --transition-fast: 150ms ease-out;
      --transition-med: 200ms ease-out;

      --toolbar-h: 48px;
      --sidebar-w: 320px;
      --radius: 6px;
    }

    /* ------------------------------------------------------------------ */
    /* Fonts — SUSE Mono (self-hosted, code blocks only)                   */
    /* Unbounded + Albert Sans loaded via Google Fonts (display=swap)      */
    /* ------------------------------------------------------------------ */
    @font-face {
      font-family: "SUSE Mono";
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url("/static/fonts/SUSEMono-Medium.woff2") format("woff2");
    }
    @font-face {
      font-family: "SUSE Mono";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url("/static/fonts/SUSEMono-Bold.woff2") format("woff2");
    }

    /* ------------------------------------------------------------------ */
    /* Reset + base                                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      color: var(--text-primary);
      background: var(--surface);
      line-height: 1.6;
      min-height: 100vh;
    }

    body.terminal-open {
      overflow: hidden;
    }

    body.mobile-sidebar-open {
      overflow: hidden;
    }

    body.terminal-open #layout {
      max-width: 100vw;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Toolbar                                                             */
    /* ------------------------------------------------------------------ */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-sans);
      font-size: 13px;
    }

    #toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    #toolbar-file {
      font-weight: 500;
      color: var(--text-primary);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #toolbar-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--dark-amethyst);
      padding: 2px 8px;
      border-radius: 99px;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }

    #toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-btn {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      min-height: 36px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
      line-height: 1.3;
    }

    .toolbar-btn:hover {
      background: var(--dark-amethyst);
      border-color: var(--dark-amethyst);
    }

    .toolbar-btn:focus-visible {
      outline: 2px solid var(--violet-twilight);
      outline-offset: 2px;
    }

    .toolbar-btn--primary {
      background: var(--violet-twilight);
      border-color: var(--violet-twilight);
      color: var(--text-primary);
    }

    .toolbar-btn--primary:hover {
      background: oklch(0.52 0.21 289.55);
      border-color: oklch(0.52 0.21 289.55);
    }

    .toolbar-btn--icon {
      padding: 7px 10px;
      min-width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                              */
    /* ------------------------------------------------------------------ */
    #layout {
      display: flex;
      padding-top: var(--toolbar-h);
      min-height: 100vh;
    }

    #doc-wrap {
      flex: 1;
      min-width: 0;
      transition: margin-right var(--transition-med);
    }

    #doc-wrap.sidebar-open {
      margin-right: var(--sidebar-w);
    }

    #doc {
      max-width: 72ch;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Document content typography — Unbounded for headings */
    #doc h1, #doc h2, #doc h3 {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 1.2;
      text-wrap: balance;
    }
    #doc h2, #doc h3 {
      font-weight: 400;
    }
    #doc h1 { font-size: 2.4rem; margin-top: 1.25em; margin-bottom: 0.5em; }
    #doc h2 { font-size: 1.8rem; margin-top: 1.75em; margin-bottom: 0.5em; }
    #doc h3 { font-size: 1.4rem; margin-top: 1.5em; margin-bottom: 0.5em; }
    #doc p { margin-bottom: 1em; text-wrap: pretty; }
    #doc pre {
      background: oklch(0.26 0.02 300);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    #doc code {
      font-family: var(--font-mono);
      font-size: 0.9em;
    }
    #doc :not(pre) > code {
      background: oklch(0.26 0.02 300);
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    #doc blockquote {
      border-left: 2px solid var(--border);
      padding-left: 16px;
      margin: 1em 0;
      color: var(--text-muted);
    }
    #doc table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }
    #doc th, #doc td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    #doc th {
      font-weight: 500;
      background: var(--surface-raised);
    }
    #doc ul, #doc ol {
      margin-bottom: 1em;
      padding-left: 24px;
    }
    #doc li { margin-bottom: 0.25em; }
    #doc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }
    #doc img {
      max-width: 100%;
      border-radius: var(--radius);
      margin-bottom: 1em;
    }
    #doc a {
      color: var(--violet-twilight);
      text-decoration: none;
    }
    #doc a:hover { text-decoration: underline; }

    /* ------------------------------------------------------------------ */
    /* Annotatable blocks                                                  */
    /* ------------------------------------------------------------------ */
    #doc [data-block-id] {
      position: relative;
      cursor: pointer;
      transition: background var(--transition-fast);
      border-radius: 3px;
      padding: 2px 4px;
      margin-left: -4px;
      margin-right: -4px;
    }

    #doc [data-block-id]:hover {
      background: oklch(0.12 0.015 290);
    }

    #doc [data-block-id].annotated {
      background: oklch(0.17 0.08 300);
      border: 1px solid oklch(0.28 0.12 300);
      border-radius: 4px;
    }

    #doc [data-block-id].annotated::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet-twilight);
      opacity: 0.8;
    }

    #doc [data-block-id].stale {
      background: oklch(0.16 0.06 85);
      border: 1px solid oklch(0.35 0.1 85);
      border-radius: 4px;
    }

    #doc [data-block-id].stale::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warning);
      opacity: 0.8;
    }

    #doc [data-block-id].annotation-pulse {
      animation: annotation-pulse 900ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes annotation-pulse {
      0% {
        box-shadow: 0 0 0 0 oklch(0.72 0.14 295 / 0.7);
      }
      48% {
        box-shadow: 0 0 0 8px oklch(0.72 0.14 295 / 0.18);
      }
      100% {
        box-shadow: 0 0 0 0 oklch(0.72 0.14 295 / 0);
      }
    }

    /* ------------------------------------------------------------------ */
    /* Sidebar — fixed to viewport, scroll synced with document            */
    /* ------------------------------------------------------------------ */
    #sidebar {
      position: fixed;
      top: var(--toolbar-h);
      right: 0;
      bottom: 0;
      width: 0;
      overflow: hidden;
      background: var(--surface-raised);
      border-left: 1px solid transparent;
      transition: width var(--transition-med), border-color var(--transition-med);
      z-index: 80;
    }

    #sidebar.open {
      width: var(--sidebar-w);
      border-left-color: var(--border);
    }

    #sidebar-inner {
      width: var(--sidebar-w);
      height: 100%;
      padding: 20px 16px;
      overflow-y: auto;
    }

    /* Sidebar header */
    #sidebar-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
    }

    #sidebar-header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    #sidebar-header-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--violet-tint);
    }

    /* Section dividers */
    .sidebar-section {
      margin-bottom: 20px;
    }

    .sidebar-section:last-child {
      margin-bottom: 0;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--danger);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid oklch(0.25 0.08 25);
    }

    /* Annotation items */
    .sidebar-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .sidebar-item:hover {
      border-color: var(--dark-amethyst);
      background: oklch(0.10 0.01 300);
    }

    .sidebar-item:focus-visible {
      outline: 2px solid var(--violet-twilight);
      outline-offset: 1px;
    }

    .sidebar-item-number {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--dark-amethyst);
      color: var(--violet-tint);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      line-height: 1;
      margin-top: 1px;
    }

    .sidebar-item-body {
      min-width: 0;
      flex: 1;
    }

    .sidebar-item-comment {
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .sidebar-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sidebar-item-lines {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .sidebar-item-status {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-item-status.stale {
      background: oklch(0.2 0.05 85);
      color: var(--warning);
    }

    .sidebar-item-status.orphaned {
      background: oklch(0.2 0.06 25);
      color: var(--danger);
    }

    .sidebar-item-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .sidebar-item-btn {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .sidebar-item-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .sidebar-item-btn--danger:hover {
      color: var(--danger);
      border-color: var(--danger);
    }

    .sidebar-item-btn.confirming {
      color: var(--danger);
      border-color: var(--danger);
      background: oklch(0.2 0.06 25);
    }

    /* Empty state */
    .sidebar-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      text-align: center;
    }

    .sidebar-empty-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: var(--text-muted);
      font-size: 18px;
      opacity: 0.5;
    }

    .sidebar-empty-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Modal overlay                                                       */
    /* ------------------------------------------------------------------ */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-med), visibility var(--transition-med);
    }

    #modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    #modal-backdrop {
      position: absolute;
      inset: 0;
      background: oklch(0 0 0 / 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #modal {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(8px) scale(0.98);
      transition: transform var(--transition-med);
    }

    #modal-overlay.open #modal {
      transform: translateY(0) scale(1);
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    #modal-title {
      font-size: 15px;
      font-weight: 600;
    }

    #modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      font-size: 18px;
      transition: all var(--transition-fast);
    }

    #modal-close:hover {
      background: var(--dark-amethyst);
      color: var(--text-primary);
    }

    #modal-close:focus-visible {
      outline: 2px solid var(--violet-twilight);
      outline-offset: 1px;
    }

    #modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    #modal-context {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #modal-context-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    #modal-context.modal-context--warning {
      color: var(--danger);
      border-color: oklch(0.35 0.12 25);
      background: oklch(0.14 0.04 25);
      font-family: var(--font-sans);
      font-size: 13px;
      white-space: normal;
      max-height: none;
    }

    #modal-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      resize: vertical;
      transition: border-color var(--transition-fast);
    }

    #modal-textarea:focus {
      outline: none;
      border-color: var(--violet-twilight);
    }

    #modal-textarea::placeholder {
      color: var(--text-muted);
    }

    #modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    #modal-footer-left {
      display: flex;
      gap: 8px;
    }

    #modal-footer-right {
      display: flex;
      gap: 8px;
    }

    .modal-btn {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      min-height: 38px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .modal-btn:hover {
      background: var(--dark-amethyst);
      border-color: var(--dark-amethyst);
    }

    .modal-btn:focus-visible {
      outline: 2px solid var(--violet-twilight);
      outline-offset: 2px;
    }

    .modal-btn--primary {
      background: var(--violet-twilight);
      border-color: var(--violet-twilight);
      color: var(--text-primary);
    }

    .modal-btn--primary:hover {
      background: oklch(0.52 0.21 289.55);
      border-color: oklch(0.52 0.21 289.55);
    }

    .modal-btn--danger {
      color: var(--danger);
      border-color: var(--danger);
    }

    .modal-btn--danger:hover {
      background: oklch(0.2 0.06 25);
    }

    .modal-shortcut {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px 0 12px;
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0.6;
    }

    .modal-shortcut kbd {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      line-height: 1.4;
    }

    /* ------------------------------------------------------------------ */
    /* Terminal state                                                      */
    /* ------------------------------------------------------------------ */
    #terminal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background:
        linear-gradient(180deg, oklch(0.12 0.025 305 / 0.86), var(--surface) 42%),
        repeating-linear-gradient(90deg, oklch(0.24 0.04 305 / 0.18) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, oklch(0.24 0.04 305 / 0.12) 0 1px, transparent 1px 72px),
        var(--surface);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow-x: hidden;
    }

    #terminal.visible {
      display: flex;
    }

    #terminal-panel {
      position: relative;
      width: min(100%, 680px);
      min-height: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 42px 36px 34px;
      overflow: hidden;
    }

    #terminal-panel::before,
    #terminal-panel::after {
      content: "";
      position: absolute;
      inset: 18px;
      pointer-events: none;
    }

    #terminal-panel::before {
      border: 1px solid var(--border);
      border-radius: 14px;
      background:
        linear-gradient(90deg, var(--violet-tint), transparent 26%) top left / 42% 1px no-repeat,
        linear-gradient(270deg, var(--violet-tint), transparent 26%) bottom right / 42% 1px no-repeat,
        oklch(0.14 0.018 305 / 0.72);
    }

    #terminal-panel::after {
      inset: 28px;
      border: 1px solid oklch(0.32 0.055 305 / 0.42);
      border-radius: 10px;
    }

    #terminal-sparks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .terminal-spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet-tint);
      opacity: 0;
      animation: terminal-spark 760ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .terminal-spark:nth-child(1) { left: 20%; top: 28%; animation-delay: 80ms; }
    .terminal-spark:nth-child(2) { right: 22%; top: 25%; animation-delay: 150ms; }
    .terminal-spark:nth-child(3) { left: 29%; bottom: 25%; animation-delay: 210ms; }
    .terminal-spark:nth-child(4) { right: 30%; bottom: 28%; animation-delay: 270ms; }
    .terminal-spark:nth-child(5) { left: 50%; top: 18%; animation-delay: 330ms; }

    #terminal-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #terminal-mark {
      position: relative;
      width: 86px;
      height: 86px;
      margin-bottom: 22px;
      border: 1px solid oklch(0.47 0.14 295 / 0.62);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, oklch(0.481 0.194 289.55 / 0.34), transparent 66%),
        var(--dark-amethyst);
      color: var(--text-primary);
      animation: terminal-arrive 420ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #terminal-mark::before {
      content: "";
      position: absolute;
      inset: -9px;
      border-radius: 50%;
      border: 1px solid oklch(0.72 0.14 295 / 0.24);
      transform: scale(0.82);
      opacity: 0;
      animation: terminal-ring 780ms cubic-bezier(0.16, 1, 0.3, 1) 140ms both;
    }

    #terminal-mark svg {
      width: 40px;
      height: 40px;
    }

    #terminal-mark path {
      fill: none;
      stroke: currentColor;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: terminal-check 520ms cubic-bezier(0.16, 1, 0.3, 1) 150ms forwards;
    }

    #terminal-kicker {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--violet-tint);
      margin-bottom: 8px;
    }

    #terminal-title {
      font-family: var(--font-sans);
      font-size: 34px;
      line-height: 1.05;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    #terminal-msg {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 48ch;
      line-height: 1.5;
      margin-bottom: 22px;
    }

        #terminal-error {
      display: none;
      color: var(--danger);
      font-size: 14px;
      margin-top: 14px;
      max-width: 52ch;
    }

    #terminal-error.visible {
      display: block;
    }

    #terminal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    #terminal.terminal--error #terminal-mark {
      border-color: oklch(0.62 0.18 25 / 0.7);
      background: oklch(0.2 0.06 25);
    }

    #terminal.terminal--error #terminal-mark path {
      animation: none;
      stroke-dashoffset: 0;
    }

    #terminal.terminal--error #terminal-sparks,
    #terminal.terminal--error #terminal-file-list,
    #terminal.terminal--error #terminal-copy-prompt {
      display: none;
    }

    /* Terminal file list */
    .terminal-file-list {
      width: min(100%, 560px);
      margin-bottom: 16px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 240px;
      overflow-y: auto;
    }

    .terminal-file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    .terminal-file-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .terminal-file-path {
      color: var(--violet-tint);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .terminal-file-count {
      flex-shrink: 0;
      margin-left: 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    @keyframes terminal-arrive {
      from { opacity: 0; transform: translateY(10px) scale(0.84); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes terminal-check {
      to { stroke-dashoffset: 0; }
    }

    @keyframes terminal-ring {
      from { opacity: 0.7; transform: scale(0.82); }
      to { opacity: 0; transform: scale(1.34); }
    }

    @keyframes terminal-spark {
      0% { opacity: 0; transform: translateY(8px) scale(0.6); }
      28% { opacity: 0.86; }
      100% { opacity: 0; transform: translateY(-18px) scale(1); }
    }

    /* ------------------------------------------------------------------ */
    /* Empty state hint                                                    */
    /* ------------------------------------------------------------------ */
    #empty-hint {
      display: none;
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    #empty-hint.visible {
      display: block;
    }

    #empty-hint-icon {
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    /* ------------------------------------------------------------------ */
    /* Loading state                                                       */
    /* ------------------------------------------------------------------ */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 250;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--font-mono);
    }

    #loading.hidden {
      display: none;
    }

    /* ------------------------------------------------------------------ */
    /* Status bar                                                          */
    /* ------------------------------------------------------------------ */
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 90;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      background: var(--surface-raised);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      gap: 16px;
      cursor: pointer;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.ok { background: var(--success); }
    .status-dot.warn { background: var(--warning); }
    .status-dot.error { background: var(--danger); }

    #shutdown-notice {
      position: fixed;
      right: 16px;
      bottom: 40px;
      z-index: 120;
      width: min(380px, calc(100vw - 32px));
      padding: 14px 16px 15px;
      border: 1px solid oklch(0.30 0.07 85);
      border-radius: var(--radius);
      background: oklch(0.145 0.025 300);
      color: var(--text-primary);
      box-shadow: 0 18px 40px oklch(0.035 0.01 300 / 0.55);
    }

    .shutdown-notice-title {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .shutdown-notice-text {
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .shutdown-notice-text code {
      font-family: var(--font-mono);
      font-size: 0.92em;
      color: oklch(0.78 0.08 295);
      background: oklch(0.20 0.045 300);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }

    /* ------------------------------------------------------------------ */
    /* Reduced motion                                                      */
    /* ------------------------------------------------------------------ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-delay: 0.01ms !important;
      }
      #modal { transform: none; }
      #modal-overlay.open #modal { transform: none; }
    }

    /* ------------------------------------------------------------------ */
    /* File zone — crafted navigation tree                                */
    /* ------------------------------------------------------------------ */
    .file-zone {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .file-zone-title {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    #file-list {
      max-height: calc(100vh - var(--toolbar-h) - 220px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #file-list::-webkit-scrollbar {
      width: 4px;
    }
    #file-list::-webkit-scrollbar-track {
      background: transparent;
    }
    #file-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Row: flat, single line — directory crumbs + primary basename + count pill */
    .file-zone-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      column-gap: 8px;
      width: 100%;
      min-height: 34px;
      padding: 6px 8px;
      margin-bottom: 1px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.3;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast),
                  border-color var(--transition-fast);
    }

    .file-zone-item--enter {
      animation: file-zone-enter 200ms ease-out both;
    }

    @keyframes file-zone-enter {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .file-zone-item:hover {
      background: oklch(0.10 0.01 300);
    }

    .file-zone-item:focus-visible {
      outline: 2px solid var(--violet-twilight);
      outline-offset: 1px;
    }

    /* Active: violet-tint background + full violet border (no side stripe) */
    .file-zone-item.active {
      background: oklch(0.14 0.04 295);
      border-color: var(--violet-twilight);
    }

    .file-zone-item.active .file-zone-item-basename {
      color: var(--text-primary);
    }

    .file-zone-item.active .file-zone-item-dir {
      background: oklch(0.19 0.045 295);
      border-color: oklch(0.30 0.09 295);
      color: oklch(0.76 0.06 295);
    }

    .file-zone-item-path {
      display: flex;
      align-items: center;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .file-zone-item-crumbs {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      flex: 0 1 auto;
      overflow: hidden;
    }

    /* Directory crumb — smaller, subdued, and allowed to compress before the file name */
    .file-zone-item-dir {
      flex: 0 1 auto;
      min-width: 0;
      max-width: 78px;
      font-size: 12px;
      font-weight: 500;
      line-height: 17px;
      color: oklch(0.68 0.018 300);
      background: oklch(0.155 0.022 300);
      border: 1px solid oklch(0.22 0.035 300);
      border-radius: 4px;
      padding: 0 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-zone-item-separator {
      flex: 0 0 auto;
      color: oklch(0.36 0.035 300);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }

    /* Basename — highest contrast, kept outside the shrinking directory run */
    .file-zone-item-basename {
      flex: 0 1 auto;
      min-width: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Zero-annotation rows stay readable but do not compete with annotated files */
    .file-zone-item[data-annotation-count="0"] .file-zone-item-basename {
      color: oklch(0.82 0.01 300);
    }

    /* Count pill — matches sidebar-item-number badge */
    .file-zone-item-count {
      flex-shrink: 0;
      justify-self: end;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--dark-amethyst);
      color: var(--violet-tint);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-sans);
      line-height: 1;
      padding: 0 5px;
    }

    /* Hide count pill when 0 */
    .file-zone-item[data-annotation-count="0"] .file-zone-item-count {
      display: none;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .file-zone-item, .file-zone-item--enter {
        animation: none;
        transition-duration: 0.01ms;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                          */
    /* ------------------------------------------------------------------ */
    @media (max-width: 768px) {
      :root {
        --toolbar-h: 56px;
      }

      body {
        min-height: 100dvh;
      }

      #toolbar {
        padding: 0 max(12px, env(safe-area-inset-left)) 0 max(12px, env(safe-area-inset-right));
        gap: 10px;
      }

      #toolbar-left {
        flex: 1;
        gap: 8px;
      }

      #toolbar-file {
        max-width: none;
        min-width: 0;
        font-size: 14px;
      }

      #toolbar-count {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        padding: 5px 9px;
        font-size: 12px;
      }

      #toolbar-right {
        gap: 6px;
      }

      .toolbar-btn {
        min-height: 44px;
        padding: 10px 14px;
        font-size: 14px;
      }

      .toolbar-btn--icon {
        min-width: 44px;
        padding: 10px;
      }

      #doc {
        max-width: 66ch;
        padding: 28px 18px 104px;
        font-size: 17px;
        line-height: 1.65;
      }

      #doc h1 { font-size: 2rem; }
      #doc h2 { font-size: 1.55rem; }
      #doc h3 { font-size: 1.28rem; }

      #doc pre {
        padding: 14px;
        margin-left: -6px;
        margin-right: -6px;
      }

      #doc th,
      #doc td {
        padding: 10px;
      }

      #doc [data-block-id] {
        padding: 8px 7px;
        margin-left: -7px;
        margin-right: -7px;
        border-radius: 6px;
        touch-action: manipulation;
      }

      #doc [data-block-id]:hover {
        background: transparent;
      }

      #doc [data-block-id].annotated,
      #doc [data-block-id].stale {
        border-radius: 6px;
      }

      #sidebar {
        top: auto;
        left: 0;
        right: 0;
        bottom: 32px;
        width: 100%;
        height: min(78dvh, 560px);
        transform: translateY(calc(100% + 32px));
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 14px 14px 0 0;
        box-shadow: 0 -18px 48px oklch(0.025 0.012 300 / 0.68);
        transition: transform var(--transition-med), border-color var(--transition-med);
      }

      #sidebar.open {
        z-index: 150;
        width: 100%;
        max-width: none;
        transform: translateY(0);
        border-top-color: var(--border);
      }

      #sidebar::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 50%;
        width: 42px;
        height: 4px;
        border-radius: 99px;
        background: oklch(0.42 0.035 300);
        transform: translateX(-50%);
      }

      #sidebar-inner {
        width: 100%;
        padding: 24px 14px calc(18px + env(safe-area-inset-bottom));
        overscroll-behavior: contain;
      }

      #sidebar-header {
        align-items: center;
        margin-bottom: 12px;
      }

      #sidebar-header-title {
        font-size: 16px;
      }

      .sidebar-item {
        gap: 12px;
        min-height: 64px;
        padding: 12px;
        margin-bottom: 8px;
      }

      .sidebar-item-number {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .sidebar-item-comment {
        font-size: 15px;
        line-height: 1.45;
      }

      .sidebar-item-lines {
        font-size: 12px;
      }

      .sidebar-item-actions {
        gap: 8px;
        margin-top: 10px;
      }

      .sidebar-item-btn {
        min-height: 40px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .sidebar-empty {
        padding: 36px 18px;
      }

      .sidebar-empty-text {
        font-size: 15px;
      }

      #doc-wrap.sidebar-open {
        margin-right: 0;
      }

      #modal-overlay {
        align-items: flex-end;
        padding: 0;
      }

      #modal-backdrop {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: oklch(0 0 0 / 0.66);
      }

      #modal {
        max-width: none;
        max-height: calc(100dvh - 12px);
        border-right: none;
        border-bottom: none;
        border-left: none;
        border-radius: 14px 14px 0 0;
        transform: translateY(100%);
      }

      #modal-overlay.open #modal {
        transform: translateY(0);
      }

      #modal-header {
        padding: 16px 16px 12px;
      }

      #modal-title {
        font-size: 17px;
      }

      #modal-close {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      #modal-body {
        padding: 14px 16px 16px;
      }

      #modal-context-label {
        font-size: 12px;
      }

      #modal-context {
        max-height: 96px;
        margin-bottom: 14px;
        font-size: 13px;
      }

      #modal-textarea {
        min-height: 34dvh;
        padding: 14px;
        font-size: 16px;
      }

      #modal-footer {
        align-items: stretch;
        gap: 10px;
        padding: 12px 16px max(14px, env(safe-area-inset-bottom));
      }

      #modal-footer-left,
      #modal-footer-right {
        gap: 8px;
      }

      #modal-footer-right {
        flex: 1;
        justify-content: flex-end;
      }

      .modal-btn {
        min-height: 44px;
        padding: 10px 15px;
        font-size: 14px;
      }

      #modal-save {
        min-width: 92px;
      }

      .modal-shortcut {
        display: none;
      }

      #terminal {
        justify-content: flex-start;
        overflow-y: auto;
      }
      #terminal-panel {
        min-height: auto;
        padding: 36px 20px 28px;
      }
      #terminal-panel::before {
        inset: 8px;
      }
      #terminal-panel::after {
        inset: 18px;
      }
      #terminal-title {
        font-size: 28px;
      }
      #terminal-actions {
        width: min(100%, 560px);
        flex-direction: column;
      }
      #terminal-actions .toolbar-btn {
        width: 100%;
      }

      #status-bar {
        height: 32px;
        padding-bottom: env(safe-area-inset-bottom);
        font-size: 11px;
      }

      #file-list {
        max-height: none;
      }

      .file-zone {
        margin-top: 18px;
        padding-top: 14px;
      }

      .file-zone-item {
        min-height: 44px;
        padding: 9px 10px;
        margin-bottom: 4px;
      }

      .file-zone-item-basename {
        font-size: 14px;
      }

      .file-zone-item-dir {
        max-width: 96px;
        font-size: 12px;
        line-height: 20px;
      }

      .file-zone-item-count {
        min-width: 24px;
        height: 24px;
      }
    }

    @media (hover: hover) {
      #doc [data-block-id]:hover {
        background: oklch(0.12 0.015 290);
      }
    }
  </style>
</head>
<body data-file-name="<!--FILE_NAME-->" data-file-key="<!--FILE_KEY-->">
  <!-- Loading -->
  <div id="loading">loading…</div>

  <!-- Toolbar -->
  <header id="toolbar">
    <div id="toolbar-left">
      <span id="toolbar-file"></span>
      <span id="toolbar-count">0</span>
    </div>
    <div id="toolbar-right">
      <button id="btn-sidebar" class="toolbar-btn toolbar-btn--icon" title="Toggle sidebar" aria-label="Toggle sidebar" aria-controls="sidebar" aria-expanded="false">☰</button>
      <button id="btn-done" class="toolbar-btn toolbar-btn--primary">Done</button>
    </div>
  </header>

  <!-- Layout -->
  <div id="layout">
    <div id="doc-wrap">
      <main id="doc">
        <!--BLOCKS-->
      </main>
      <div id="empty-hint">
        <div id="empty-hint-icon">⊕</div>
        <div>Click any block to add a comment</div>
      </div>
    </div>
    <aside id="sidebar" aria-label="Annotations">
      <div id="sidebar-inner">
        <div id="sidebar-header">
          <span id="sidebar-header-title">Annotations</span>
          <span id="sidebar-header-count"></span>
        </div>
        <div id="sidebar-list"></div>
        <div id="file-zone" class="file-zone" style="display:none">
          <div class="file-zone-title">Files</div>
          <div id="file-list"></div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-text">ready</span>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-backdrop"></div>
    <div id="modal">
      <div id="modal-header">
        <span id="modal-title">Add Comment</span>
        <button id="modal-close" aria-label="Close">✕</button>
      </div>
      <div id="modal-body">
        <div id="modal-context-label">Block context</div>
        <div id="modal-context"></div>
        <textarea id="modal-textarea" placeholder="Type your comment…" aria-label="Comment"></textarea>
      </div>
      <div id="modal-footer">
        <div id="modal-footer-left">
          <button id="modal-delete" class="modal-btn modal-btn--danger" style="display:none">Delete</button>
        </div>
        <div id="modal-footer-right">
          <button id="modal-cancel" class="modal-btn">Cancel</button>
          <span id="modal-shortcut" class="modal-shortcut"><kbd>⌘</kbd> <kbd>Enter</kbd></span>
          <button id="modal-save" class="modal-btn modal-btn--primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Terminal state -->
  <div id="terminal" role="dialog" aria-modal="true" aria-labelledby="terminal-title" aria-describedby="terminal-msg">
    <div id="terminal-panel">
      <div id="terminal-sparks" aria-hidden="true">
